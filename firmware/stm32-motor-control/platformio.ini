; Home Scout - STM32H5 Motor Control Firmware
; Runs on the VENTUNO Q's built-in STM32H5F5 MCU
; Handles: motor PWM, encoders, PID, safety, CAN-FD bridge

[env:ventuno_stm32h5]
platform = ststm32
board = nucleo_h563zi  ; Closest available board profile - update when VENTUNO Q profile exists
framework = arduino
board_build.mcu = stm32h563zit6

; Build flags
build_flags =
    -D SCOUT_MAX_SPEED_MPS=0.3
    -D SCOUT_HEARTBEAT_TIMEOUT_MS=500
    -D SCOUT_WATCHDOG_TIMEOUT_MS=100
    -D SCOUT_ENCODER_CPR=3200
    -D SCOUT_WHEEL_DIAMETER_MM=80

; Serial monitor
monitor_speed = 115200

; Unit test environment (runs on host, no hardware needed)
[env:native]
platform = native
build_flags = -D UNIT_TEST
test_framework = unity
