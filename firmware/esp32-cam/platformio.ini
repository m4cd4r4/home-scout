; Home Scout - ESP32-S3-CAM Fixed Room Camera Firmware
; Runs on Freenove ESP32-S3-CAM modules mounted in each room
; Serves MJPEG stream on local WiFi for Scout to pull frames

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3

build_flags =
    -D BOARD_HAS_PSRAM
    -D SCOUT_STREAM_FPS=5
    -D SCOUT_IDLE_FPS=1
    -D SCOUT_MOTION_BUMP_SECONDS=10

monitor_speed = 115200

lib_deps =
    esp32-camera
