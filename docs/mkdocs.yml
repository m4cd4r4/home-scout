site_name: Home Scout
site_description: A privacy-first home companion robot built on Arduino VENTUNO Q
site_url: https://YOUR_USERNAME.github.io/home-scout/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: amber

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Build Guides:
    - Overview: build-guides/overview.md
    - "Phase 1: Scout Can Talk": build-guides/phase-1-voice.md
    - "Phase 2: Scout Can See": build-guides/phase-2-vision.md
    - "Phase 3: Scout Can Move": build-guides/phase-3-mobility.md
    - "Phase 4: Scout Remembers": build-guides/phase-4-memory.md
    - "Phase 5: Scout Knows Us": build-guides/phase-5-faces.md
    - "Phase 6: Sky Eye": build-guides/phase-6-drone.md
    - Troubleshooting: build-guides/troubleshooting.md
  - Reference:
    - VENTUNO Q Setup: reference/ventuno-q-setup.md
    - STM32 Firmware: reference/stm32-firmware.md
    - Camera Calibration: reference/camera-calibration.md
    - Network Isolation: reference/network-isolation.md
  - Design:
    - Personality Guide: design/personality-guide.md
    - Room Mapping: design/room-mapping.md
  - Contributing:
    - Hardware: contributing/hardware-contributions.md
    - Software: contributing/software-contributions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
