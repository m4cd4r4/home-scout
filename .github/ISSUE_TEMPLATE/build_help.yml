name: Build Help
description: I'm stuck building a phase
labels: ["help wanted"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase you are building
      options:
        - Phase 1 - Scout Can Talk
        - Phase 2 - Scout Can See
        - Phase 3 - Scout Can Move
        - Phase 4 - Scout Remembers Everything
        - Phase 5 - Scout Knows Us
        - Phase 6 - Scout's Sky Eye
    validations:
      required: true

  - type: textarea
    id: stuck
    attributes:
      label: Step you are stuck on
      description: Which step in the build guide?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What you have tried
      description: What have you already attempted?
    validations:
      required: true

  - type: textarea
    id: photos
    attributes:
      label: Photos of your build
      description: Drag and drop photos here

  - type: textarea
    id: errors
    attributes:
      label: Error messages
      description: Paste any error output
      render: shell
