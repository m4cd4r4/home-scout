# Room definitions for object location mapping
# Polygons are defined in SLAM map coordinates (meters)
# Create your own by running the room-mapping tool on your SLAM map

rooms:
  - name: "living_room"
    zones:
      - name: "couch"
        polygon: [[0.5, 1.5], [2.5, 1.5], [2.5, 3.0], [0.5, 3.0]]
      - name: "tv_stand"
        polygon: [[3.0, 1.0], [4.0, 1.0], [4.0, 2.0], [3.0, 2.0]]
      - name: "coffee_table"
        polygon: [[1.5, 2.5], [2.5, 2.5], [2.5, 3.5], [1.5, 3.5]]

  - name: "kitchen"
    zones:
      - name: "counter"
        polygon: [[4.5, 0.5], [7.0, 0.5], [7.0, 1.5], [4.5, 1.5]]
      - name: "table"
        polygon: [[5.0, 2.0], [7.0, 2.0], [7.0, 4.0], [5.0, 4.0]]

  - name: "hallway"
    zones:
      - name: "entry"
        polygon: [[3.5, 4.5], [5.0, 4.5], [5.0, 6.0], [3.5, 6.0]]

  - name: "bedroom_1"
    zones:
      - name: "bed"
        polygon: [[0.5, 6.5], [2.5, 6.5], [2.5, 8.5], [0.5, 8.5]]
      - name: "desk"
        polygon: [[3.0, 6.5], [4.0, 6.5], [4.0, 7.5], [3.0, 7.5]]

  - name: "bedroom_2"
    zones:
      - name: "bed"
        polygon: [[5.5, 6.5], [7.5, 6.5], [7.5, 8.5], [5.5, 8.5]]
